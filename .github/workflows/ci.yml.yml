name: Java and Cucumber CI

on: 
  push:
    branches: 
      - master
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '11'

      - name: Build and Test
        run: |
          mvn test
        env:
          MAVEN_OPTS: '-Dmaven.repo.local=./.m2/repository'
          
      - name: upload report
        if: always()
        uses: actions/upload-artifact@v3
        with:
            name: extent-report
            path: extent.html